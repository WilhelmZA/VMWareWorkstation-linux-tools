# vmwareworkstation-module-builder.conf
# Optional user configuration for vmwareworkstation-module-builder.sh.
# This file is sourced after the script's built-in defaults, so any value
# set here takes precedence.
#
# Installed to: /etc/vmwareworkstation-module-builder.conf
# ---------------------------------------------------------------------------

# Directory where VMware Workstation installs its module source tarballs.
# VMware ships vmmon.tar and vmnet.tar here when installed.
#MODULES_TARBALLS="/usr/lib/vmware/modules/source"

# MOK private key and certificate for Secure Boot module signing.
# Both must exist for signing to occur. The private key is root-readable only
# (chmod 600, owned by root) — no passphrase is used to allow automated signing.
# Generated and enrolled by setup_vmwareworkstation-module-builder.sh.
#MOK_KEY="/etc/vmwareworkstation-module-builder/MOK.priv"
#MOK_CERT="/etc/vmwareworkstation-module-builder/MOK.crt"

# Kernel version to build for. Defaults to the currently running kernel (uname -r).
# Override to build for a specific kernel version, or use --kernel <kver> at runtime.
#KVER="6.17.0-19-generic"

# Log file. Set to "" to disable logging.
#LOG_FILE="/var/log/vmwareworkstation-module-builder.log"
