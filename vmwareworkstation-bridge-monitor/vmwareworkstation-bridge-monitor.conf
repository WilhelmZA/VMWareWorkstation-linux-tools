# vmwareworkstation-bridge-monitor.conf
# Optional user configuration for vmwareworkstation-bridge-monitor.sh.
# This file is sourced after the script's built-in defaults, so any value
# set here takes precedence.
#
# Installed to: /etc/vmwareworkstation-bridge-monitor.conf
# ---------------------------------------------------------------------------

# ADAPTERS — ordered list of interface name patterns to consider as bridge
# candidates, highest priority first. Supports exact names or glob patterns.
# The first interface that matches a pattern AND passes the connectivity test
# will be selected.
#
# Examples:
#   "enp3s0"    — exact name, single built-in ethernet port
#   "enx*"      — any USB ethernet dongle
#   "wlp*"      — any PCI Wi-Fi adapter
#   "wlan*"     — alternative Wi-Fi naming convention
#
#ADAPTERS=(
#    "enx*"
#    "wlp*"
#)

# EXCLUDED — interfaces that must never be selected as a bridge, regardless
# of their state or connectivity. Add any VPN tunnels or virtual adapters
# specific to your environment.
#
#EXCLUDED=(
#    "tailscale0"
#    "zcctun0"
#    "vmnet0"
#    "vmnet1"
#    "vmnet8"
#    "docker0"
#    "lo"
#)

# PING_HOST — IP address used for the connectivity test.
# Use a plain IP to avoid DNS interception by ZScaler or other proxies.
#
#PING_HOST="1.1.1.1"
